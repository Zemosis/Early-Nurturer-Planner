# Alembic configuration for Early Nurturer Planner
#
# The actual DATABASE_URL is loaded from .env at runtime by alembic/env.py.
# Do NOT hardcode credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template for new migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long revision messages in filenames
truncate_slug_length = 40

# Timezone for migration timestamps (UTC recommended)
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
