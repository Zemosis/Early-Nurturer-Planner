<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alphabet Poster - {{ big_letter }}</title>
    <style>
        @font-face {
            font-family: 'Nunito';
            src: url('{{ font_dir }}/Nunito-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Nunito';
            src: url('{{ font_dir }}/Nunito-Black.ttf') format('truetype');
            font-weight: 900;
            font-style: normal;
        }
        @page { size: letter portrait; margin: 0; }
        body {
            --theme-color: initial;
            margin: 0; padding: 0; width: 8.5in; height: 11in;
            font-family: 'Nunito', Arial, sans-serif; background-color: #FFFFFF;
        }
        .poster-container {
            width: 100%; height: 100%;
            border: 35px solid var(--theme-color);
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 1in 0.8in;
        }
        .big-letter {
            font-size: 180px; font-weight: 900;
            color: var(--theme-color); letter-spacing: 4px;
            margin: 0; line-height: 1.1; padding-bottom: 20px;
        }
        .image-container {
            flex: 1 1 auto; display: flex; justify-content: center; align-items: center;
            width: 100%; min-height: 0; padding: 10px 0; overflow: hidden;
        }
        .image-container img {
            max-width: 100%; max-height: 100%; object-fit: contain;
            border-radius: 20px;
        }
        .word-line {
            font-size: 52px; font-weight: 700;
            color: var(--theme-color); letter-spacing: 2px;
            margin: 0; line-height: 1; white-space: nowrap;
            text-align: center;
        }
        .word-line .prefix {
            font-size: 36px; font-weight: 700;
            color: #666666;
        }
    </style>
</head>
<body style="--theme-color: {{ theme_color }};">
    <div class="poster-container">
        <div class="big-letter">{{ big_letter }}</div>
        <div class="image-container">
            {% if image_url %}
            <img src="{{ image_url }}" alt="{{ word }}">
            {% endif %}
        </div>
        <div class="word-line"><span class="prefix">is for </span>{{ word }}</div>
    </div>
</body>
</html>
