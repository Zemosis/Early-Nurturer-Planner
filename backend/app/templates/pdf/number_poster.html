<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Number Poster - Count to {{ counting_to }}</title>
    <style>
        @font-face {
            font-family: 'Nunito';
            src: url('{{ font_dir }}/Nunito-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Nunito';
            src: url('{{ font_dir }}/Nunito-Black.ttf') format('truetype');
            font-weight: 900;
            font-style: normal;
        }
        @page { size: letter portrait; margin: 0; }
        body {
            margin: 0;
            font-family: 'Nunito', Arial, sans-serif; background-color: #FFFFFF;
            box-sizing: border-box;
        }
        .page {
            width: 8.5in; height: 11in;
            box-sizing: border-box;
            page-break-after: always;
        }
        .page:last-child { page-break-after: avoid; }
        .poster-container {
            width: 100%; height: 100%;
            border: 35px solid {{ theme_color }};
            box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; padding: 1in 0.8in;
        }
        .big-number {
            font-size: 200px; font-weight: 900;
            color: {{ theme_color }}; letter-spacing: 4px;
            margin: 0; line-height: 1;
        }
        .counting-grid {
            flex: 1 1 auto; display: flex; flex-wrap: wrap;
            justify-content: center; align-items: center;
            gap: 20px; width: 100%; min-height: 0; padding: 10px 0;
            overflow: hidden;
        }
        .grid-item {
            max-width: 200px; max-height: 200px; object-fit: contain;
            border-radius: 12px;
        }
        .count-text {
            font-size: 55px; font-weight: 700;
            color: {{ theme_color }}; letter-spacing: 2px;
            margin: 0; line-height: 1; text-align: center;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    {% for page in pages %}
    <div class="page">
        <div class="poster-container">
            <div class="big-number">{{ page.number }}</div>
            <div class="counting-grid">
                {% if image_url %}
                {% for _ in range(page.number) %}
                <img src="{{ image_url }}" alt="{{ counting_object }}" class="grid-item">
                {% endfor %}
                {% endif %}
            </div>
            <div class="count-text">{{ page.number_word }} {{ counting_object }}</div>
        </div>
    </div>
    {% endfor %}
</body>
</html>
